$mainMod = SUPER

# Launch apps
bind = $mainMod, Return, exec, gtk-launch $terminal
bind = $mainMod, B, exec, gtk-launch $browser

# Launch utils
bind = $mainMod, P, exec, $menu
bind = $mainMod, W, exec, grim -g "$(slurp)" - | tesseract - stdout | wl-copy
bind = $mainMod, space, exec, $terminal --class float-term clipse
bind = $mainMod, PERIOD, exec, emote
bind = , Print, exec, ~/.dotfiles/config/hypr/scripts/screenshot.sh
bind = ALT SHIFT, S, exec, ~/.dotfiles/config/hypr/scripts/screenshot.sh
bind = , XF86Launch7, exec, ~/.dotfiles/config/hypr/scripts/screenshot.sh

bind = $mainMod, F, fullscreen
bind = $mainMod, X, killactive

# Moving Windows
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Moving Focus
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switching Workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod ALT, K, workspace, e+1
bind = $mainMod ALT, J, workspace, e-1

# Moving Windows from Workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Moving Windows from Workspaces silent
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10
# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Media player keys (Realted to headphones)
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPrev, exec, playerctl previous

########
# MISC #
########

# Disable internal screen when lid is closed
bindl = $mainMod ALT, D, exec, eww close dashboard-main dashboard-external || hyprctl keyword monitor "eDP-1, disable"

# Re-enable internal screen when lid is opened
bindl = $mainMod ALT SHIFT, D, exec, hyprctl keyword monitor "eDP-1, preferred, auto, 1" && eww reload

# Minimizing with special workspace
bind = $mainMod, M, movetoworkspacesilent, special:minimized
bind = $mainMod SHIFT, M, togglespecialworkspace, minimized

# Move cursor away when meta key is pressed
bind = $mainMod, SUPER_L, exec, hyprctl dispatch movecursor $(hyprctl -j monitors | jq '.[0].width') 0

# Back up 
bind = $mainMod SHIFT, B, exec, ~/.dotfiles/config/hypr/scripts/bkup.sh


###########
# SUBMAPS #
###########

# Dashboard submap
bind = $mainMod, D, exec, eww open-many dashboard-main dashboard-external --toggle
bind = $mainMod, D, submap, dashboard

submap = dashboard

bind = , space, exec, playerctl play-pause
bind = , Return, exec, playerctl play-pause

bind = , N, exec, playerctl next
bind = , K, exec, playerctl next
bind = , L, exec, playerctl next
bind = , PERIOD, exec, playerctl next

bind = , P, exec, playerctl next
bind = , J, exec, playerctl next
bind = , H, exec, playerctl next
bind = , COMMA, exec, playerctl next

bind = , escape, exec, eww open-many dashboard-main dashboard-external --toggle
bind = , escape, submap, reset
bind = $mainMod, D, exec, eww open-many dashboard-main dashboard-external --toggle
bind = $mainMod, D, submap, reset

submap = reset
